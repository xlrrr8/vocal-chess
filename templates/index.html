<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocal Chess</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=2">
    <!-- Chessboard.js CSS -->
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css"
        integrity="sha384-q94+BZtLrkL1/ohfjR8c6L+A6qzNH9R2hBLwyoAfu3i/WCvQjzL2RQJ3uNHDISdU" crossorigin="anonymous">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <header>
            <h1>Vocal Chess</h1>
            <p class="status" id="status">White's Turn</p>
        </header>

        <div class="game-area">
            <div id="board" style="width: 400px"></div>
        </div>

        <div class="controls">
            <button id="start-voice-btn" class="btn primary">
                <span class="icon">🎤</span> Speak Move
            </button>
            <button id="reset-btn" class="btn secondary">Reset Game</button>
        </div>

        <div class="log" id="log" style="border: 2px solid red; display: block;">
            <p>Log Box Initialized</p>
        </div>
    </div>

    <!-- jQuery (required for chessboard.js) -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"
        integrity="sha384-ZvpUoO/+PpLXR1lu4jmpXWu80pZlYUAfxl5NsBMWOEPSjUn/6Z/hRTt8+pR6L4N2"
        crossorigin="anonymous"></script>
    <!-- Chessboard.js -->
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"
        integrity="sha384-8Vi8VHwn3vjQ9eUHUxex3JSN/NFqUg3QbPyX8kWyb93+8AC/pPWTzj+nHtbC5bxD"
        crossorigin="anonymous"></script>

    <script src="{{ url_for('static', filename='script.js') }}?v=2"></script>
</body>

</html>
